<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Smart NoteKeeper Dashboard</title>
    <style>
        /* Modern Premium Glassmorphism & Cyber Dark Theme styling */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #090d16, #111827);
            color: #f3f4f6;
            margin: 0; padding: 30px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 2.5rem; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .header p { color: #9ca3af; margin: 5px 0 0 0; font-size: 1rem; }
        
        /* Note Creator Input Form Box Layout */
        .note-form {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px; border-radius: 16px;
            width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px; box-sizing: border-box;
        }
        textarea {
            width: 100%; height: 80px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            color: #fff; padding: 12px; font-size: 1rem; resize: none;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }
        textarea:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        button {
            width: 100%; padding: 12px; margin-top: 12px; background: #0284c7;
            color: white; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s ease-in-out;
        }
        button:hover { background: #0369a1; box-shadow: 0 0 15px #0284c7; }
        
        /* Grid Layout mapping for displayed Sticky Notes */
        .notes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px; width: 100%; max-width: 1100px;
        }
        .note-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid #38bdf8; border-radius: 12px;
            padding: 18px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .note-text { white-space: pre-wrap; word-wrap: break-word; font-size: 1.05rem; line-height: 1.5; margin-bottom: 25px; }
        .note-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #9ca3af; }
        .tag { background: rgba(56, 189, 248, 0.15); color: #38bdf8; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
        .delete-btn { background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; padding: 0; width: auto; margin: 0; }
        .delete-btn:hover { color: #f87171; text-shadow: 0 0 5px #ef4444; box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ Smart NoteKeeper</h1>
        <p>Real-time Synchronization • Local Persistence • Smart Automated Tags</p>
    </div>

    <!-- Interface section to construct new notes -->
    <div class="note-form">
        <textarea id="note-input" placeholder="Type a smart note here... (e.g. 'Study Algorithms for midterm examination')"></textarea>
        <button onclick="addNote()">Secure & Save Note</button>
    </div>

    <!-- Active dynamic dashboard wrapper area -->
    <div id="notes-grid" class="notes-grid"></div>

    <!-- Client-side WebSocket configuration script loader -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let notesArray = JSON.parse(localStorage.getItem('smart_notes')) || [];

        // Dynamic Tag Parser Strategy Logic (Extracts first useful keyword as #Tag)
        function generateSmartTag(text) {
            const cleanText = text.replace(/[^a-zA-Z0-9 ]/g, "");
            const words = cleanText.trim().split(/\s+/);
            if (words.length > 0 && words[0].length > 1) {
                return `#${words[0].charAt(0).toUpperCase() + words[0].slice(1).toLowerCase()}`;
            }
            return "#General";
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = '';
            
            notesArray.forEach((note, index) => {
                const card = document.createElement('div');
                card.className = 'note-card';
                // Rotate left borders with neon accents based on text hash lengths
                const colors = ['#38bdf8', '#a855f7', '#ec4899', '#10b981', '#f59e0b'];
                card.style.borderLeftColor = colors[index % colors.length];

                card.innerHTML = `
                    <div class="note-text">${note.text}</div>
                    <div class="note-footer">
                        <span class="tag">${note.tag}</span>
                        <button class="delete-btn" onclick="deleteNote(${index})">Delete</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addNote() {
            const input = document.getElementById('note-input');
            const text = input.value.trim();
            if (!text) return;

            const newNote = {
                text: text,
                tag: generateSmartTag(text)
            };

            notesArray.unshift(newNote);
            saveAndSync();
            input.value = '';
        }

        function deleteNote(index) {
            notesArray.splice(index, 1);
            saveAndSync();
        }

        function saveAndSync() {
            // Step 1: Persist data inside client browser local state storage
            localStorage.setItem('smart_notes', JSON.stringify(notesArray));
            renderNotes();
            // Step 2: Stream updates instantly to backend web sockets pipeline
            socket.emit('sync-notes', notesArray);
        }

        // Receive frame events from the cloud-network backplane pipeline streams
        socket.on('update-notes', (incomingNotes) => {
            notesArray = incomingNotes;
            localStorage.setItem('smart_notes', JSON.stringify(notesArray));
            renderNotes();
        });

        // Initialize state engine layout
        renderNotes();
    </script>
</body>
</html>
