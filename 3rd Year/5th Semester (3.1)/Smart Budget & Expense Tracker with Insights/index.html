<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Smart Budget Tracker</title>
    <!-- Importing Chart.js via CDN for zero-install charts -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: #e2e8f0; margin: 0; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; display: flex; gap: 30px; margin-top: 20px; }
        .panel { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 25px; border-radius: 16px; backdrop-filter: blur(10px); }
        h1 { color: #38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.2); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 15px; }
        input, select { background: rgba(255,255,255,0.1); color: white; }
        button { background: #0284c7; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0369a1; box-shadow: 0 0 12px #0284c7; }
        .alert-box { width: 100%; max-width: 840px; background: rgba(234, 179, 8, 0.15); border-left: 5px solid #eab308; color: #fef08a; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
        .chart-wrap { max-width: 350px; margin: 0 auto; }
    </style>
</head>
<body>

    <h1>📊 Smart Budget & Expense Analytics</h1>
    <div id="insight-alert" class="alert-box">Loading budget intelligence...</div>

    <div class="container">
        <!-- Input Form Panel -->
        <div class="panel">
            <h3>Add Transaction Record</h3>
            <select id="category">
                <option value="Food & Dining">Food & Dining</option>
                <option value="Rent & Utilities">Rent & Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Transportation">Transportation</option>
            </select>
            <input type="number" id="amount" placeholder="Amount (e.g. 250)">
            <input type="month" id="month">
            <button onclick="submitExpense()">Log Expense</button>
        </div>

        <!-- Visual Analytics Chart Panel -->
        <div class="panel">
            <h3>Expense Distribution Insights</h3>
            <div class="chart-wrap">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let expenseChart = null;

        // Automatically set current month on load
        document.getElementById('month').value = new Date().toISOString().slice(0, 7);

        async function fetchAnalytics() {
            const res = await fetch('/analytics');
            const data = await res.json();
            
            document.getElementById('insight-alert').innerText = data.alert;

            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            // Destroy older instances to prevent overlaps during re-renders
            if (expenseChart) expenseChart.destroy();

            expenseChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: data.labels,
                    datasets: [{
                        data: data.values,
                        backgroundColor: ['#38bdf8', '#a855f7', '#ec4899', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: '#e2e8f0' } } } }
            });
        }

        async function submitExpense() {
            const category = document.getElementById('category').value;
            const amount = document.getElementById('amount').value;
            const month = document.getElementById('month').value;

            if(!amount) return alert("Please specify an amount value.");

            await fetch('/add-product' ? '/add-expense' : '/add-expense', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category, amount, month })
            });

            document.getElementById('amount').value = '';
            fetchAnalytics();
        }

        fetchAnalytics();
    </script>
</body>
</html>
